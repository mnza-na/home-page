<main class="main">
  <div class="content">
    <app-head-page [title]="`Welcome to ${title()}`" [icon]="'/logo-2.svg'">
      <p>
        Esta pagina es mi carta de presentacion. Soy Matias Zarate, ingeniero con el titulo de ingenieria en computacion e informatica.
      </p>
    </app-head-page>
    <div class="divider" role="separator" aria-label="Divider"></div>
    <div class="project-side">
      <app-mini-box-container [title]="'Mis projects'">
        @for (project of projects; track project.title) {
          <app-mini-box [name]="project.title" [link]="project.link" [content]="project.short_description"></app-mini-box>
        }
      </app-mini-box-container>
    </div>
  </div>
</main>


<router-outlet />
